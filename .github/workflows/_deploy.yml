# Reusable deploy workflow: pins the new image tag, then rolls the target
# environment out on its EC2 host over AWS SSM (no SSH, no static AWS keys).
name: _deploy

on:
  workflow_call:
    inputs:
      environment:
        description: staging | production
        required: true
        type: string
      service:
        description: app being released (xental-backend | paylibre); empty = redeploy current pins
        required: false
        default: ""
        type: string
      sha:
        description: git SHA of the app image to pin
        required: false
        default: ""
        type: string

permissions:
  id-token: write   # for AWS OIDC
  contents: write   # to commit the version pin

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Gates on GitHub Environment protection rules (prod = required reviewers).
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout env branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.environment == 'production' && 'main' || 'staging' }}

      - name: Pin new image tag
        if: ${{ inputs.service != '' && inputs.sha != '' }}
        run: |
          set -euo pipefail
          ENV="${{ inputs.environment }}"
          case "${{ inputs.service }}" in
            xental-backend) VAR=XENTAL_API_IMAGE;   IMG=ghcr.io/xental-paylibre/xental-backend ;;
            paylibre)       VAR=PAYLIBRE_API_IMAGE; IMG=ghcr.io/xental-paylibre/paylibre ;;
            *) echo "unknown service: ${{ inputs.service }}" >&2; exit 1 ;;
          esac
          f="versions/${ENV}.env"
          sed -i -E "s#^${VAR}=.*#${VAR}=${IMG}:sha-${{ inputs.sha }}#" "$f"
          git config user.name  "xental-ci"
          git config user.email "ci@xental-paylibre.noreply"
          git add "$f"
          git commit -m "deploy(${ENV}): ${{ inputs.service }} -> sha-${{ inputs.sha }}" || echo "no change to pin"
          git push

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy on host via SSM
        run: |
          set -euo pipefail
          ENV="${{ inputs.environment }}"
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=xental-${ENV}" "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId' --output text)
          test -n "$INSTANCE_ID" || { echo "no running instance tagged xental-${ENV}" >&2; exit 1; }
          echo "Target instance: $INSTANCE_ID"

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "deploy ${ENV}" \
            --parameters commands="REPO_DIR=/opt/xental-infrastructure /opt/xental-infrastructure/scripts/deploy.sh ${ENV}" \
            --query 'Command.CommandId' --output text)
          echo "SSM command: $CMD_ID"

          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" || true
          STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query Status --output text)
          echo "----- deploy output -----"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text
          echo "----- deploy errors -----"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardErrorContent --output text
          echo "Final status: $STATUS"
          [ "$STATUS" = "Success" ]
