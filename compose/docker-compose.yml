# Base composition for the Xental platform.
#
# This file is environment-agnostic: every value that differs between staging
# and prod comes from the runtime env file (env/<env>.runtime.env), and every
# image tag comes from versions/<env>.env. Deploy with:
#
#   docker compose -f compose/docker-compose.yml \
#                  -f compose/docker-compose.<env>.yml \
#                  --env-file env/<env>.runtime.env up -d
#
# Nothing secret or environment-specific is hard-coded here.

name: xental

networks:
  edge:        # public-facing, only Traefik is attached + published
    name: xental-edge
  internal:    # private app/db network, never published to the host
    name: xental-internal

volumes:
  traefik-acme:      # Let's Encrypt certificate store
  postgres-data:     # database persistence
  redis-data:
  xental-logs:       # app log volumes (written by non-root app user)
  paylibre-logs:

services:
  # ---- Reverse proxy / TLS termination --------------------------------
  traefik:
    image: ${TRAEFIK_IMAGE:-traefik:v3.6}
    container_name: xental-traefik
    restart: unless-stopped
    networks: [edge, internal]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Config + dynamic dir are env-selectable (base vs crowdsec variants).
      - ./traefik/${TRAEFIK_CONFIG:-traefik.yml}:/etc/traefik/traefik.yml:ro
      - ./traefik/${TRAEFIK_DYNAMIC_DIR:-dynamic}:/etc/traefik/dynamic:ro
      - traefik-acme:/acme
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Traefik reads static config from env vars too; this sets the ACME contact
      # email (the YAML file can't interpolate ${ACME_EMAIL}).
      TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL: ${ACME_EMAIL}
    labels:
      - "traefik.enable=true"

  # ---- Shared backing services ----------------------------------------
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    container_name: xental-postgres
    restart: unless-stopped
    networks: [internal]
    environment:
      # Superuser; per-service databases/users are created by the init script.
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_USER}
      XENTAL_DB_NAME: ${XENTAL_DB_NAME}
      XENTAL_DB_USER: ${XENTAL_DB_USER}
      XENTAL_DB_PASSWORD: ${XENTAL_DB_PASSWORD}
      PAYLIBRE_DB_NAME: ${PAYLIBRE_DB_NAME}
      PAYLIBRE_DB_USER: ${PAYLIBRE_DB_USER}
      PAYLIBRE_DB_PASSWORD: ${PAYLIBRE_DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sh:/docker-entrypoint-initdb.d/10-init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: xental-redis
    restart: unless-stopped
    networks: [internal]
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Application services (images built by their own repos) ----------
  xental-api:
    image: ${XENTAL_API_IMAGE:?set XENTAL_API_IMAGE in versions/<env>.env}
    container_name: xental-api
    restart: unless-stopped
    networks: [internal]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${XENTAL_ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_HTTP_PORTS: "8080"
      LOG_DIRECTORY: /app/logs
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${XENTAL_DB_NAME};Username=${XENTAL_DB_USER};Password=${XENTAL_DB_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
      # Frontend URL (user-facing pages) + this API's URL (magic-link target).
      App__BaseUrl: ${FRONTEND_URL:-https://${XENTAL_API_HOST}}
      App__ApiBaseUrl: "https://${XENTAL_API_HOST}"
      # JWT (signing key is a secret; issuer/audience are non-secret defaults).
      Jwt__SigningKey: ${JWT_SIGNING_KEY:?set JWT_SIGNING_KEY as a GitHub secret}
      Jwt__Issuer: ${JWT_ISSUER:-xental}
      Jwt__Audience: ${JWT_AUDIENCE:-xental-api}
      Jwt__DashboardTokenLifetimeSeconds: ${JWT_DASHBOARD_TOKEN_SECONDS:-900}
      # Session cookies (HttpOnly+Secure) + rotating refresh token; CORS for the frontend.
      Auth__RefreshTokenDays: ${AUTH_REFRESH_TOKEN_DAYS:-14}
      Auth__CookieSecure: ${AUTH_COOKIE_SECURE:-true}
      Auth__CookieDomain: ${AUTH_COOKIE_DOMAIN:-}
      Cors__AllowedOrigins: ${CORS_ALLOWED_ORIGINS:-}
      # Transactional email (Resend). Empty until secrets set (sends are skipped/logged).
      Resend__ApiKey: ${RESEND_API_KEY:-}
      Resend__FromEmail: ${RESEND_FROM_EMAIL:-}
      # Social login (optional; empty disables the provider).
      Auth__Google__ClientId: ${GOOGLE_CLIENT_ID:-}
      Auth__Google__ClientSecret: ${GOOGLE_CLIENT_SECRET:-}
      Auth__GitHub__ClientId: ${GH_OAUTH_CLIENT_ID:-}
      Auth__GitHub__ClientSecret: ${GH_OAUTH_CLIENT_SECRET:-}
      # Nomba integration (Phase 2). Base URL non-secret; credentials are secrets.
      Nomba__BaseUrl: ${NOMBA_BASE_URL:-https://api.nomba.com/v1/}
      Nomba__ClientId: ${NOMBA_CLIENT_ID:-}
      Nomba__ClientSecret: ${NOMBA_CLIENT_SECRET:-}
      Nomba__AccountId: ${NOMBA_ACCOUNT_ID:-}
      Nomba__SubAccountId: ${NOMBA_SUB_ACCOUNT_ID:-}
      Nomba__TokenRefreshSeconds: ${NOMBA_TOKEN_REFRESH_SECONDS:-1500}
      Nomba__WebhookSecret: ${NOMBA_WEBHOOK_SECRET:-}
      # OpenTelemetry → Alloy (empty endpoint when monitoring is off = disabled).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${MONITORING_HOST:+http://alloy:4317}
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: xental-api
      OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=${ENVIRONMENT}"
    volumes:
      - xental-logs:/app/logs
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=xental-internal"
      - "traefik.http.routers.xental-api.rule=Host(`${XENTAL_API_HOST}`)"
      - "traefik.http.routers.xental-api.entrypoints=websecure"
      - "traefik.http.routers.xental-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.xental-api.middlewares=api-chain@file"
      - "traefik.http.services.xental-api.loadbalancer.server.port=8080"
      - "traefik.http.services.xental-api.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.xental-api.loadbalancer.healthcheck.interval=15s"

  paylibre-api:
    image: ${PAYLIBRE_API_IMAGE:?set PAYLIBRE_API_IMAGE in versions/<env>.env}
    container_name: paylibre-api
    restart: unless-stopped
    networks: [internal]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${PAYLIBRE_ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_HTTP_PORTS: "8080"
      LOG_DIRECTORY: /app/logs
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${PAYLIBRE_DB_NAME};Username=${PAYLIBRE_DB_USER};Password=${PAYLIBRE_DB_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
      # OpenTelemetry → Alloy (empty endpoint when monitoring is off = disabled).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${MONITORING_HOST:+http://alloy:4317}
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: paylibre-api
      OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=${ENVIRONMENT}"
    volumes:
      - paylibre-logs:/app/logs
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=xental-internal"
      - "traefik.http.routers.paylibre-api.rule=Host(`${PAYLIBRE_API_HOST}`)"
      - "traefik.http.routers.paylibre-api.entrypoints=websecure"
      - "traefik.http.routers.paylibre-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.paylibre-api.middlewares=api-chain@file"
      - "traefik.http.services.paylibre-api.loadbalancer.server.port=8080"
      - "traefik.http.services.paylibre-api.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.paylibre-api.loadbalancer.healthcheck.interval=15s"

  # ---- Frontend (Next.js) — served at the root domain --------------------
  xental-frontend:
    image: ${XENTAL_FRONTEND_IMAGE:?set XENTAL_FRONTEND_IMAGE in versions/<env>.env}
    container_name: xental-frontend
    restart: unless-stopped
    networks: [internal]
    environment:
      NODE_ENV: production
      # Server-rendered parts read these at runtime; client bundles bake NEXT_PUBLIC_* at build.
      NEXT_PUBLIC_APP_URL: ${FRONTEND_URL:-}
      NEXT_PUBLIC_API_URL: "https://${XENTAL_API_HOST}"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=xental-internal"
      - "traefik.http.routers.xental-frontend.rule=Host(`${XENTAL_FRONTEND_HOST}`)"
      - "traefik.http.routers.xental-frontend.entrypoints=websecure"
      - "traefik.http.routers.xental-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.xental-frontend.loadbalancer.server.port=3000"
      - "traefik.http.services.xental-frontend.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.xental-frontend.loadbalancer.healthcheck.interval=15s"
