# Traefik static config WITH the CrowdSec bouncer plugin + file access logs.
# Selected by setting TRAEFIK_CONFIG=traefik.crowdsec.yml (security overlay).

global:
  checkNewVersion: false
  sendAnonymousUsage: false

experimental:
  plugins:
    crowdsec-bouncer:
      moduleName: github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
      version: v1.4.2

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
    network: xental-internal
  file:
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: "${ACME_EMAIL}"
      storage: /acme/acme.json
      tlsChallenge: {}

log:
  level: INFO

# CrowdSec parses this access log to detect attacks.
accessLog:
  filePath: /var/log/traefik/access.log
  format: json
